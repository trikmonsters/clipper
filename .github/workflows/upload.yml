name: FFmpeg Edit + TikTok Draft Upload

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:

      video_url:
        description: 'URL video TikTok'
        required: true

      output_filename:
        description: 'Nama output tanpa .mp4'
        required: true
        default: 'video-001'

      tiktok_description:
        description: 'Caption TikTok'
        required: false
        default: 'Video keren! #fyp #viral'

jobs:
  edit-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:

      # ─────────────────────────────
      # Checkout Repository
      # ─────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────
      # Setup Python
      # ─────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ─────────────────────────────
      # Install Dependencies
      # ─────────────────────────────
      - name: Install dependencies
        run: |
          set -e

          sudo apt-get update -y
          sudo apt-get install -y ffmpeg

          pip install requests playwright

          playwright install chromium
          playwright install-deps chromium

          ffmpeg -version | head -1

      # ─────────────────────────────
      # Prepare Folder
      # ─────────────────────────────
      - name: Prepare folder
        run: |
          mkdir -p media

      # ─────────────────────────────
      # Create urls.txt
      # ─────────────────────────────
      - name: Create URL list
        run: |
          echo "${{ github.event.inputs.video_url }}" > urls.txt

          echo "Generated urls.txt:"
          cat urls.txt

      # ─────────────────────────────
      # Download TikTok Video
      # ─────────────────────────────
      - name: Run downloader.py
        run: |
          set -e

          python3 download.py

          ffprobe input_video.mp4 > /dev/null 2>&1 || {
            echo "❌ Invalid downloaded video"
            exit 1
          }

          echo "✅ Video downloaded"

      # ─────────────────────────────
      # FFmpeg Edit
      # ─────────────────────────────
      - name: Edit Video
        run: |
          set -e

          OUTPUT_FILE="media/video.mp4"

          echo "🎬 Processing video..."

          ffmpeg -y \
            -i input_video.mp4 \
            -vf "scale=1080:1920" \
            -c:v libx264 \
            -preset ultrafast \
            -crf 23 \
            -c:a aac \
            "$OUTPUT_FILE"

          echo "✅ Video edited"

      # ─────────────────────────────
      # Validate cookies secret
      # ─────────────────────────────
      - name: Validate cookies secret
        run: |
          set -e

          if [ -z '${{ secrets.TIKTOK_COOKIES_JSON }}' ]; then
            echo "❌ Secret TIKTOK_COOKIES_JSON kosong!"
            exit 1
          fi

          printf '%s' '${{ secrets.TIKTOK_COOKIES_JSON }}' > cookies.json

          python3 -c "
          import json, sys

          try:
              data = json.load(open('cookies.json'))

              if isinstance(data, dict) and 'cookies' in data:
                  data = data['cookies']

              assert isinstance(data, list)

              print(f'✅ cookies.json valid: {len(data)} cookies')

          except Exception as e:
              print(f'❌ cookies.json invalid: {e}')
              sys.exit(1)
          "

      # ─────────────────────────────
      # Upload TikTok Draft
      # ─────────────────────────────
      - name: Upload TikTok Draft
        run: |
          set -e

          echo "Starting uploader..."

          python3 uploader.py \
            --url "$(pwd)/media/video.mp4" \
            --description "${{ github.event.inputs.tiktok_description }}" \
            --cookies cookies.json

      # ─────────────────────────────
      # Upload Artifact
      # ─────────────────────────────
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: media/*.mp4

      # ─────────────────────────────
      # Cleanup
      # ─────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          rm -f cookies.json
          echo "🎉 Workflow completed"
