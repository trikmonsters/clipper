name: TikTok Upload - Post Video

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'URL video (http/https atau path lokal)'
        required: true
      tiktok_description:
        description: 'Caption TikTok'
        required: false
        default: 'Video keren! #fyp #viral'

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:

      # ─────────────────────────────
      # Checkout Repo
      # ─────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────
      # Setup Python
      # ─────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ─────────────────────────────
      # Install Dependencies
      # ─────────────────────────────
      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update -y
          sudo apt-get install -y xvfb
          pip install requests playwright
          playwright install chromium
          playwright install-deps chromium

      # ─────────────────────────────
      # Validate Cookie Secret
      # ─────────────────────────────
      - name: Validate cookie secret
        run: |
          set -e
          if [ -z '${{ secrets.TIKTOK_COOKIES_JSON }}' ]; then
            echo "❌ Secret TIKTOK_COOKIES_JSON is empty!"
            exit 1
          fi
          printf '%s' '${{ secrets.TIKTOK_COOKIES_JSON }}' > cookies.json
          python3 -c "
          import json, sys
          try:
              data = json.load(open('cookies.json'))
              if isinstance(data, dict) and 'cookies' in data:
                  data = data['cookies']
              assert isinstance(data, list)
              print(f'✅ cookies.json valid: {len(data)} cookies')
          except Exception as e:
              print(f'❌ cookies.json invalid: {e}')
              sys.exit(1)
          "

      # ─────────────────────────────
      # Prepare media folder
      # ─────────────────────────────
      - name: Prepare media folder
        run: mkdir -p media

      # ─────────────────────────────
      # Upload & Post to TikTok
      # ─────────────────────────────
      - name: Upload & Post to TikTok
        run: |
          set -e
          echo "Starting uploader..."
          xvfb-run -a python3 uploader.py \
            --url "${{ github.event.inputs.video_url }}" \
            --description "${{ github.event.inputs.tiktok_description }}" \
            --cookies cookies.json

      # ─────────────────────────────
      # Upload Screenshots & Artifacts
      # ─────────────────────────────
      - name: Upload screenshots & artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-upload-result
          path: |
            before_post.png
            confirm_post_button.png
            after_post.png
            post_failed.png
          if-no-files-found: ignore

      # ─────────────────────────────
      # Cleanup
      # ─────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          rm -f cookies.json video.mp4
          echo "🎉 Workflow done"
