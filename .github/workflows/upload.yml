name: FFmpeg Edit + TikTok Upload & Post

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'URL video TikTok'
        required: true
      output_filename:
        description: 'Nama output tanpa .mp4'
        required: true
        default: 'video-001'
      tiktok_description:
        description: 'Caption TikTok'
        required: false
        default: 'Video keren! #fyp #viral'

jobs:
  edit-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update -y
          sudo apt-get install -y \
            ffmpeg \
            xvfb \
            xdotool \
            x11-utils
          pip install requests playwright
          playwright install chromium
          playwright install-deps chromium
          ffmpeg -version | head -1
          echo "✅ Dependencies installed"

      - name: Prepare folder
        run: mkdir -p media

      - name: Create URL list
        run: |
          echo "${{ github.event.inputs.video_url }}" > urls.txt
          echo "Generated urls.txt:"
          cat urls.txt

      - name: Run downloader
        run: |
          set -e
          python3 download.py
          ffprobe input_video.mp4 > /dev/null 2>&1 || {
            echo "❌ Downloaded video is invalid"
            exit 1
          }
          echo "✅ Video downloaded successfully"

      - name: Edit Video with FFmpeg
        run: |
          set -e
          OUTPUT_FILE="media/${{ github.event.inputs.output_filename }}.mp4"
          echo "🎬 Processing video..."
          ffmpeg -y \
            -i input_video.mp4 \
            -vf "scale=2160:3840:flags=lanczos,unsharp=7:7:3.0:7:7:1.2,eq=contrast=1.45:brightness=0.02:saturation=1.05:gamma=1.04,format=yuv420p" \
            -c:v libx264 \
            -preset veryslow \
            -crf 18 \
            -profile:v high \
            -level 5.1 \
            -pix_fmt yuv420p \
            -movflags +faststart \
            -c:a aac \
            -b:a 192k \
            -ar 48000 \
            "$OUTPUT_FILE"
          echo "✅ Video edited: $OUTPUT_FILE"
          ffprobe "$OUTPUT_FILE" > /dev/null 2>&1 || {
            echo "❌ Output video invalid"
            exit 1
          }

      - name: Validate cookie secret
        run: |
          set -e
          if [ -z '${{ secrets.TIKTOK_COOKIES_JSON }}' ]; then
            echo "❌ Secret TIKTOK_COOKIES_JSON is empty!"
            exit 1
          fi
          printf '%s' '${{ secrets.TIKTOK_COOKIES_JSON }}' > cookies.json
          python3 -c "
          import json, sys
          try:
              data = json.load(open('cookies.json'))
              if isinstance(data, dict) and 'cookies' in data:
                  data = data['cookies']
              assert isinstance(data, list)
              print(f'✅ cookies.json valid: {len(data)} cookies')
          except Exception as e:
              print(f'❌ cookies.json invalid: {e}')
              sys.exit(1)
          "

      - name: Upload & Post to TikTok
        run: |
          set -e
          echo "🚀 Starting uploader..."
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python3 uploader.py \
            --url "$(pwd)/media/${{ github.event.inputs.output_filename }}.mp4" \
            --description "${{ github.event.inputs.tiktok_description }}" \
            --cookies cookies.json

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-result-${{ github.event.inputs.output_filename }}
          path: |
            before_caption.png
            before_post.png
            confirm_post_button.png
            after_post.png
            post_failed.png
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          rm -f cookies.json input_video.mp4 urls.txt
          echo "🎉 Workflow complete"
