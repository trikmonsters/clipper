name: FFmpeg Edit + TikTok Draft Upload

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:

      video_url:
        description: 'URL video TikTok'
        required: true

      output_filename:
        description: 'Nama output tanpa .mp4'
        required: true
        default: 'video-001'

      tiktok_description:
        description: 'Caption TikTok'
        required: false
        default: 'Video keren! #fyp #viral'

jobs:
  edit-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:

      # ─────────────────────────────
      # Checkout Repository
      # ─────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────
      # Setup Python
      # ─────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ─────────────────────────────
      # Install Dependencies
      # ─────────────────────────────
      - name: Install dependencies
        run: |
          set -e

          sudo apt-get update -y
          sudo apt-get install -y ffmpeg

          pip install requests playwright

          playwright install chromium
          playwright install-deps chromium

          ffmpeg -version | head -1

      # ─────────────────────────────
      # Prepare Folder
      # ─────────────────────────────
      - name: Prepare folders
        run: |
          mkdir -p media

      # ─────────────────────────────
      # Create urls.txt
      # ─────────────────────────────
      - name: Create URL list
        run: |
          echo "${{ github.event.inputs.video_url }}" > urls.txt
          echo "Generated urls.txt:"
          cat urls.txt

      # ─────────────────────────────
      # Download TikTok Video
      # ─────────────────────────────
      - name: Run downloader.py
        run: |
          set -e

          python3 download.py

          ffprobe input_video.mp4 > /dev/null 2>&1 || {
            echo "❌ Invalid downloaded video"
            exit 1
          }

          echo "✅ Video downloaded"

      # ─────────────────────────────
      # FFmpeg Edit
      # ─────────────────────────────
      - name: Edit Video
        run: |
          set -e

          SAFE_NAME=$(echo "${{ github.event.inputs.output_filename }}" | tr -cd '[:alnum:]_-')
          OUTPUT_FILE="media/${SAFE_NAME}.mp4"

          echo "🎬 Processing video..."

          ffmpeg -y \
            -i input_video.mp4 \
            -vf "scale=1080:1920" \
            -c:v libx264 \
            -preset ultrafast \
            -crf 23 \
            -c:a aac \

          
            "$OUTPUT_FILE"

          echo "✅ Video edited"

      # ─────────────────────────────
      # Validate cookies secret
      # ─────────────────────────────
      - name: Validate cookies secret
        run: |
          set -e

          # Pastikan secret tidak kosong
          if [ -z '${{ secrets.TIKTOK_COOKIES_JSON }}' ]; then
            echo "❌ Secret TIKTOK_COOKIES_JSON kosong atau belum di-set!"
            echo "   Buka Settings > Secrets and variables > Actions > New repository secret"
            echo "   Nama: TIKTOK_COOKIES_JSON"
            echo "   Value: isi dengan JSON array cookies dari browser"
            exit 1
          fi

          # Tulis cookies ke file
          printf '%s' '${{ secrets.TIKTOK_COOKIES_JSON }}' > cookies.json

          # Validasi format JSON
          python3 -c "
          import json, sys
          try:
              data = json.load(open('cookies.json'))
              if isinstance(data, dict) and 'cookies' in data:
                  data = data['cookies']
              assert isinstance(data, list), 'Harus berupa list'
              names = [c.get('name','') for c in data]
              print(f'✅ cookies.json valid: {len(data)} cookies')
              # Cek ada sessionid / sid_tt (wajib untuk login TikTok)
              login_cookies = [n for n in names if n in ('sessionid', 'sid_tt', 'sid_guard')]
              if not login_cookies:
                  print('⚠️  PERINGATAN: Tidak ada cookie sessionid/sid_tt/sid_guard.')
                  print('   Pastikan Anda mengekspor cookies saat sudah login di TikTok.')
              else:
                  print(f'✅ Login cookies ditemukan: {login_cookies}')
          except Exception as e:
              print(f'❌ cookies.json tidak valid: {e}')
              sys.exit(1)
          "

      # ─────────────────────────────
      # Upload TikTok Draft
      # ─────────────────────────────
      - name: Upload TikTok Draft
        run: |
          set -e

          SAFE_NAME=$(echo "${{ github.event.inputs.output_filename }}" | tr -cd '[:alnum:]_-')

          python3 uploader.py \
            --url "file://$(pwd)/media/${SAFE_NAME}.mp4" \
            --description "${{ github.event.inputs.tiktok_description }}" \
            --cookies cookies.json

      # ─────────────────────────────
      # Upload Artifact
      # ─────────────────────────────
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: media/*.mp4

      # ─────────────────────────────
      # Cleanup sensitive files
      # ─────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          rm -f cookies.json
          echo "🎉 Workflow completed"
